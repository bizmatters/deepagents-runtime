name: deepagents-runtime

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: archived/agents/deepagents/deepagents-runtime

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        id: build
        with:
          context: archived/agents/deepagents/deepagents-runtime
          file: archived/agents/deepagents/deepagents-runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/soloz-io/waypoint/deepagents-runtime:sha-${{ github.sha }}
            ghcr.io/soloz-io/waypoint/deepagents-runtime:latest
          cache-from: type=gha,scope=deepagents-runtime
          cache-to: type=gha,mode=max,scope=deepagents-runtime

      - name: Update fleet-registry
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          FLEET_REGISTRY_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DIGEST: ${{ steps.build.outputs.digest }}
          SHA: ${{ github.sha }}
        run: |
          git clone https://x-access-token:${FLEET_REGISTRY_TOKEN}@github.com/soloz-io/fleet-registry.git /tmp/fleet-registry
          cd /tmp/fleet-registry
          mkdir -p tenants/waypoint/workloads/deepagents-runtime
          cat > tenants/waypoint/workloads/deepagents-runtime/kustomization.yaml <<EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          images:
            - name: ghcr.io/soloz-io/waypoint/deepagents-runtime
              digest: ${DIGEST}
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tenants/waypoint/workloads/deepagents-runtime/kustomization.yaml
          git commit -m "chore(deepagents-runtime): update image digest to ${SHA}" || exit 0
          git push
